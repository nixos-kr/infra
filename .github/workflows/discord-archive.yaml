name: Discord Archive

on:
  repository_dispatch:
    types: [discord-archive]

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: nixbuild/nix-quick-install-action@v33

      - name: Build discord-archive CLI
        working-directory: discord-bot
        run: nix build .#default --accept-flake-config -o result

      - name: Run archive pipeline
        id: archive
        env:
          CHANNEL_ID: ${{ github.event.client_payload.channel_id }}
          MESSAGE_ID: ${{ github.event.client_payload.message_id }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          OUTPUT=$(discord-bot/result/bin/discord-archive \
            --channel-id "$CHANNEL_ID" \
            --message-id "$MESSAGE_ID" \
            --discord-token "$DISCORD_BOT_TOKEN" \
            --gemini-key "$GEMINI_API_KEY")

          mkdir -p nixos.kr/ko/faq
          echo "$OUTPUT" | jq -c '.[]' | while read -r entry; do
            SLUG=$(echo "$entry" | jq -r '.slug')
            CONTENT=$(echo "$entry" | jq -r '.content')
            echo "$CONTENT" > "nixos.kr/ko/faq/${SLUG}.md"
          done

          COUNT=$(echo "$OUTPUT" | jq 'length')
          SLUGS=$(echo "$OUTPUT" | jq -r '[.[].slug] | join(",")')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "slugs=$SLUGS" >> "$GITHUB_OUTPUT"

      - name: Create PR
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COUNT: ${{ steps.archive.outputs.count }}
          SLUGS: ${{ steps.archive.outputs.slugs }}
        run: |
          BRANCH="archive/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add nixos.kr/ko/faq/
          git config user.name "nixoskr-bot"
          git config user.email "bot@nixos.kr"
          git commit -m "docs: add ${COUNT} FAQ entries from Discord archive"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "FAQ: ${SLUGS}" \
            --body "$(jq -n --arg count "$COUNT" '"\($count)개의 FAQ 항목이 Discord 대화에서 자동 생성되었습니다."')" \
            --head "$BRANCH" \
            --base master)

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Post result to Discord
        env:
          APPLICATION_ID: ${{ github.event.client_payload.application_id }}
          INTERACTION_TOKEN: ${{ github.event.client_payload.interaction_token }}
          PR_URL: ${{ steps.create-pr.outputs.pr_url }}
          COUNT: ${{ steps.archive.outputs.count }}
        run: |
          curl -s -X PATCH \
            "https://discord.com/api/v10/webhooks/${APPLICATION_ID}/${INTERACTION_TOKEN}/messages/@original" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg url "$PR_URL" --arg count "$COUNT" \
              '{"content": "✅ \($count)개의 FAQ PR이 생성되었습니다: \($url)"}')"

      - name: Post error to Discord on failure
        if: failure()
        env:
          APPLICATION_ID: ${{ github.event.client_payload.application_id }}
          INTERACTION_TOKEN: ${{ github.event.client_payload.interaction_token }}
        run: |
          curl -s -X PATCH \
            "https://discord.com/api/v10/webhooks/${APPLICATION_ID}/${INTERACTION_TOKEN}/messages/@original" \
            -H "Content-Type: application/json" \
            -d '{"content": "❌ 아카이브 처리 중 오류가 발생했습니다."}'
